<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Galería VOG</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- FUENTES -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Open+Sans:wght@300;400;500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='galeria.css') }}">
</head>

<body>

    <!-- NAVBAR -->
    <header class="navbar">
        <div class="logo">VOG</div>
        <nav>
            <a href="{{ url_for('index') }}">Inicio</a>
        </nav>
    </header>

    <!-- HERO -->
    <section class="galeria-hero">
        <h1>Galería Bitácora Oficial VOG</h1>
        <p>Conoce más de cerca el dispositivo y su evolución.</p>
    </section>

    <!-- GRID -->
    <section id="fotos" class="galeria-grid">

        <div class="galeria-item">
            <img src="{{ url_for('static', filename='imagesG/foto1.jpg') }}" onclick="openLightbox(this)">
        </div>

        <div class="galeria-item">
            <img src="{{ url_for('static', filename='imagesG/foto2.jpg') }}" onclick="openLightbox(this)">
        </div>

        <div class="galeria-item">
            <img src="{{ url_for('static', filename='imagesG/foto3.jpg') }}" onclick="openLightbox(this)">
        </div>

         <div class="galeria-item">
            <img src="{{ url_for('static', filename='imagesG/foto6.jpg') }}" onclick="openLightbox(this)">
        </div>


         <!-- VIDEO -->
        <div class="galeria-item">
            <video onclick="openLightbox(this)" muted>
                <source src="{{ url_for('static', filename='imagesG/video1.mp4') }}" type="video/mp4">
            </video>
        </div>


        <div class="galeria-item">
            <img src="{{ url_for('static', filename='imagesG/foto4.jpg') }}" onclick="openLightbox(this)">
        </div>

        <div class="galeria-item">
            <img src="{{ url_for('static', filename='imagesG/foto5.jpg') }}" onclick="openLightbox(this)">
        </div>

    </section>

    <!-- LIGHTBOX -->
    <div id="lightbox" class="lightbox" onclick="closeLightbox()">
        <span class="close">&times;</span>
        <div id="lightbox-content"></div>
    </div>

    <!-- FOOTER -->
    <footer class="footer">
        <p>© 2026 VOG - Proyecto de Innovación Tecnológica</p>
    </footer>

<script>
function openLightbox(element) {

    const lightbox = document.getElementById("lightbox");
    const content = document.getElementById("lightbox-content");

    content.innerHTML = "";

    if (element.tagName === "IMG") {
        const img = document.createElement("img");
        img.src = element.src;
        content.appendChild(img);
    } 
    else if (element.tagName === "VIDEO") {
        const video = document.createElement("video");
        video.src = element.querySelector("source").src;
        video.controls = true;
        video.autoplay = true;
        video.style.maxHeight = "80vh";
        content.appendChild(video);
    }

    lightbox.style.display = "flex";
}

function closeLightbox() {
    document.getElementById("lightbox").style.display = "none";
}
</script>

</body>
</html>
